name: CI — Backend & Frontend Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-check:
    name: Backend Import & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax across all files
        working-directory: backend
        run: |
          python -m compileall -q app/

      - name: Verify FastAPI app imports
        working-directory: backend
        env:
          APP_ENV: test
        run: |
          python -c "from app.main import app; print(f'✅ App loaded with {len(app.routes)} routes')"

  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Build Next.js production bundle
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://placeholder.onrender.com
        run: npm run build